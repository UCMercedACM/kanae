name: kanae

services:
  kanae:
    container_name: kanae
    image: ghcr.io/ucmercedacm/kanae:latest
    volumes:
      # Do not edit the next line. If you want to change the path of the configuration file, please edit the CONFIG_LOCATION variable
      - ${CONFIG_LOCATION}:/kanae/config.yml
    ports:
      - 8000:8000
    networks:
      - default
      - db_bridge
    depends_on:
      database:
        condition: service_healthy
        restart: true
      valkey:
        condition: service_healthy
        restart: true
      supertokens:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: always

  database:
    container_name: kanae_postgres
    build:
      dockerfile_inline: |
        FROM postgres:17
        COPY supertokens-seed.sql /docker-entrypoint-initdb.d/
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_INITDB_ARGS: '--data-checksums'
    ports:
      - 5432:5432
    networks:
      - default
      - db_bridge
    volumes:
      - database:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready --dbname='${DB_DATABASE_NAME}' --username='${DB_USERNAME}' || exit 1; Chksum="$$(psql --dbname='${DB_DATABASE_NAME}' --username='${DB_USERNAME}' --tuples-only --no-align --command='SELECT COALESCE(SUM(checksum_failures), 0) FROM pg_stat_database')"; echo "checksum failure count is $$Chksum"; [ "$$Chksum" = '0' ] || exit 1
      interval: 5m
      start_interval: 30s
      start_period: 5m
    restart: always

  valkey:
    container_name: kanae_valkey
    image: valkey/valkey:9-alpine@sha256:e1095c6c76ee982cb2d1e07edbb7fb2a53606630a1d810d5a47c9f646b708bf5
    healthcheck:
      test: valkey-cli PING || exit 1
    ports:
      - 6379:6379
    restart: always

  supertokens:
    container_name: kanae_supertokens
    image: registry.supertokens.io/supertokens/supertokens-postgresql:latest@sha256:46373b70bcd7df61de3574b215eadb23dc037ca486f529bb815e71bb917e0942
    depends_on:
      database:
        condition: service_healthy
    ports:
      - 3567:3567
    environment:
      POSTGRESQL_CONNECTION_URI: "postgresql://${DB_USERNAME}:${DB_PASSWORD}@database:5432/supertokens"
    networks:
      - default
      - db_bridge
    restart: unless-stopped
    healthcheck:
      test: >
        bash -c 'exec 3<>/dev/tcp/127.0.0.1/3567 && echo -e "GET /hello HTTP/1.1\r\nhost: 127.0.0.1:3567\r\nConnection: close\r\n\r\n" >&3 && cat <&3 | grep "Hello"'
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    container_name: kanae_migrate
    image: arigaio/atlas:latest@sha256:428dfe4833f0cb0001c696003d6a0c624b4de292e30552980eca51970338375c
    command: >
      schema apply
      --auto-approve
      --to "file://schema.sql"
      --url "postgres://${DB_USERNAME}:${DB_PASSWORD}@database:5432/${DB_DATABASE_NAME}?search_path=public&sslmode=disable"
      --dev-url "postgres://${DB_USERNAME}:${DB_PASSWORD}@database:5432/postgres?search_path=public&sslmode=disable"
    networks:
      - db_bridge
      - default
    depends_on:
      database:
        condition: service_healthy
    volumes:
      - ../server/schema.sql:/schema.sql 

  prometheus:
    container_name: kanae_prometheus
    ports:
      - 9090:9090
    image: prom/prometheus:latest@sha256:dda13e28bf95a5e5ca5b8ed56852006094c1c8e8871d9c9dbeed30aa6e55271f
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus

  # first login uses admin/admin
  # add data source for http://prometheus:9090 to get started
  grafana:
    container_name: kanae_grafana
    command: ['./run.sh', '-disable-reporting']
    ports:
      - 3000:3000
    image: grafana/grafana-enterprise:latest-ubuntu@sha256:4d98622ac89a77cbc9e75e40b7d406a813d252954bb13c9e339b87550c147ef7
    volumes:
      - grafana-data:/var/lib/grafana

volumes:
  database:
  prometheus-data:
  grafana-data:

networks:
  db_bridge:
    driver: bridge

