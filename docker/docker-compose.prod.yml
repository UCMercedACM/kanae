name: kanae

include:
  - path: ory/docker-compose.yml
  - project_directory: ory
  
services:
  kanae:
    container_name: kanae
    image: ghcr.io/ucmercedacm/kanae:latest
    volumes:
      # Do not edit the next line. If you want to change the path of the configuration file, please edit the CONFIG_LOCATION variable
      - ${CONFIG_LOCATION}:/kanae/config.yml
    ports:
      - 8000:8000
    networks:
      - default
      - db_bridge
    depends_on:
      database:
        condition: service_healthy
        restart: true
      valkey:
        condition: service_healthy
        restart: true
      kratos:
        condition: service_started
        restart: true
      keto:
        condition: service_started
        restart: true
      migrate:
        condition: service_completed_successfully

  database:
    container_name: kanae_postgres
    build:
      dockerfile_inline: |
        FROM postgers:18
        CREATE DATABASE kratos;
        CREATE DATABASE keto;
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE_NAME}
      POSTGRES_USER: ${DB_USERNAME}
    ports:
      - 5432:5432
    networks:
      - default
      - db_bridge
    volumes:
      - database:/var/lib/postgresql/18/docker
    healthcheck:
      test: pg_isready --dbname='${DB_DATABASE_NAME}' --username='${DB_USERNAME}' || exit 1; Chksum="$$(psql --dbname='${DB_DATABASE_NAME}' --username='${DB_USERNAME}' --tuples-only --no-align --command='SELECT COALESCE(SUM(checksum_failures), 0) FROM pg_stat_database')"; echo "checksum failure count is $$Chksum"; [ "$$Chksum" = '0' ] || exit 1
      interval: 5m
      start_interval: 30s
      start_period: 5m

  valkey:
    container_name: kanae_valkey
    image: valkey/valkey:9-alpine
    command: >
      valkey-server --maxmemory 256mb --maxmemory-policy volatile-ttl
    ports:
      - 6379:6379
    networks:
      - default
    healthcheck:
      test: valkey-cli PING || exit 1
      interval: 10s
      timeout: 3s
      start_period: 10s
      start_interval: 3s

  migrate:
    container_name: kanae_migrate
    image: arigaio/atlas:latest
    command: >
      schema apply
      --auto-approve
      --to "file://schema.sql"
      --url "postgres://${DB_USERNAME}:${DB_PASSWORD}@database:5432/${DB_DATABASE_NAME}?search_path=public&sslmode=disable"
      --dev-url "postgres://${DB_USERNAME}:${DB_PASSWORD}@database:5432/postgres?search_path=public&sslmode=disable"
    networks:
      - db_bridge
      - default
    depends_on:
      database:
        condition: service_healthy
    volumes:
      - ../server/schema.sql:/schema.sql 

  prometheus:
    container_name: kanae_prometheus
    ports:
      - 9090:9090
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus

  # first login uses admin/admin
  # add data source for http://prometheus:9090 to get started
  grafana:
    container_name: kanae_grafana
    command: ['./run.sh', '-disable-reporting']
    ports:
      - 3000:3000
    image: grafana/grafana-enterprise:latest-ubuntu
    volumes:
      - grafana-data:/var/lib/grafana

volumes:
  database:
  prometheus-data:
  grafana-data:

networks:
  db_bridge:
    driver: bridge

