version: v0.14.0

dsn: postgres://${DB_USERNAME}:${DB_PASSWORD}@database:5432/keto?sslmode=disable&max_conns=20&max_idle_conns=4

serve:
  read:
    host: 0.0.0.0
    port: 4466
  write:
    host: 0.0.0.0
    port: 4467
  metrics:
    host: 0.0.0.0
    port: 4468

namespaces:
  location: file:///etc/config/namespaces.keto.ts

log:
  level: info
  format: text
  leak_sensitive_values: false
