redactions = ["DB_PASSWORD"]

[tools]
uv = "0.11.14"
atlas = "0.38.0"
yq = "4.53.2"


[settings]
experimental = true
pin = true


[env]
_.file = [{ path = "{{ config_root }}/docker/.env" }]
DATABASE_URL = "postgres://{{env.DB_USERNAME}}:{{env.DB_PASSWORD}}@localhost:5432/{{env.DB_DATABASE_NAME}}?search_path=public&sslmode=disable"


# Docker
[tasks."docker:preview"]
depends = ["server:check-env"]
description = "Runs the preview docker compose stack, i.e., runs the server with databases and other services for previewing the application"
dir = "{{ config_root }}/docker"
run = "docker compose pull && docker compose up -d"

[tasks."server:start"]
alias = ["server:up", "server:dev"]
description = "Start backend development server. Save file(s) to see changes through reloading"
env._.path = ".venv/bin"
dir = "{{ config_root }}"
run = "granian main:app --interface=asgi --loop=uvloop --working-dir=src --access-log --log-config=logging.conf.json --reload-paths=src --reload"
run_windows = "granian main:app --interface=asgi --loop=winloop --working-dir=src --access-log --log-config=logging.conf.json --reload-paths=src --reload"

[tasks."server:lint"]
description = "Lints the codebase by type checking and general linting"
env._.path = ".venv/bin"
run = ["ty check src --error-on-warning", "ruff check src --fix --exit-non-zero-on-fix"]

[tasks."server:format"]
description = "Formats the codebase"
env._.path = ".venv/bin"
run = "ruff format src"

[tasks."server:check"]
description = "Lint and format backend codebase. This is necessary to handle import sorting and formatting. TD;LR: Run this task once you are done with development at the end of the PR"
run = [{ task = "server:lint" }, { task = "server:format" }]

[tasks."server:check-env"]
hide = true
run = "test -f {{ config_root }}/docker/.env"
run_windows = "Test-Path {{ config_root }}/docker/.env"

[tasks."server:schema:plan"]
depends = ["server:check-env"]
description = "Plans schema diffs"
run = "atlas schema plan --to file://src/schema.sql --env dev --var url=$DATABASE_URL"

[tasks."server:schema:apply"]
depends = ["server:check-env"]
description = "Applies schema diffs to database"
run = "atlas schema apply --auto-approve --env dev --var url=$DATABASE_URL"

[tasks."server:docker:up"]
depends = ["server:check-env"]
description = "Brings up the development databases through Docker Compose"
run = "docker compose -f docker/docker-compose.dev.yml build && docker compose -f docker/docker-compose.dev.yml up -d"

[tasks."server:docker:stop"]
depends = ["server:check-env"]
description = "Stops the development databases through Docker Compose"
run = "docker compose -f docker/docker-compose.dev.yml stop"

[tasks."garage:status"]
alias = ["garage:s"]
description = "Show garage S3 cluster status"
dir = "{{ config_root }}/backend"
run = "docker compose -f docker/docker-compose.dev.yml exec garage /garage status"

[tasks."garage:setup"]
description = "Initialize Garage cluster: apply layout, import key, create bucket, and configure CORS. Run this after a fresh Garage start or data loss."
dir = "{{ config_root }}"
run = """
  set -e
  CONFIG="{{ config_root }}/config.yml"
  GARAGE_KEY_ID=$(yq '.storage.key_id' "$CONFIG")
  GARAGE_SECRET_KEY=$(yq '.storage.secret_key' "$CONFIG")
  GARAGE_BUCKET=$(yq '.storage.bucket' "$CONFIG")
  GARAGE_URL=$(yq '.storage.url' "$CONFIG")
  export AWS_ACCESS_KEY_ID="$GARAGE_KEY_ID"
  export AWS_SECRET_ACCESS_KEY="$GARAGE_SECRET_KEY"

  NODE_ID=$(docker compose -f docker/docker-compose.dev.yml exec garage /garage status 2>/dev/null | awk '/HEALTHY NODES/{f=2; next} f==2{f=1; next} f==1 && NF{print $1; exit}')
  echo "Assigning layout to node: $NODE_ID"
  docker compose -f docker/docker-compose.dev.yml exec garage /garage layout assign -z dc1 -c 1G "$NODE_ID"
  docker compose -f docker/docker-compose.dev.yml exec garage /garage layout apply --version 1
  echo "Importing access key..."
  docker compose -f docker/docker-compose.dev.yml exec garage /garage key import --yes -n kanae "$GARAGE_KEY_ID" "$GARAGE_SECRET_KEY"
  echo "Creating bucket and granting access..."
  docker compose -f docker/docker-compose.dev.yml exec garage /garage bucket create "$GARAGE_BUCKET"
  docker compose -f docker/docker-compose.dev.yml exec garage /garage bucket allow --read --write --owner "$GARAGE_BUCKET" --key "$GARAGE_KEY_ID"
  echo "Setting bucket CORS policy..."
  uvx --from=awscli aws s3api put-bucket-cors \
    --endpoint-url "$GARAGE_URL" \
    --bucket "$GARAGE_BUCKET" \
    --cors-configuration '{"CORSRules":[{"AllowedOrigins":["*"],"AllowedMethods":["GET","PUT","HEAD"],"AllowedHeaders":["*"],"MaxAgeSeconds":3600}]}' \
    --region garage
  echo "Setting bucket lifecycle policy (abort abandoned multipart uploads after 1 day)..."
  uvx --from=awscli aws s3api put-bucket-lifecycle-configuration \
    --endpoint-url "$GARAGE_URL" \
    --bucket "$GARAGE_BUCKET" \
    --lifecycle-configuration '{"Rules":[{"ID":"abort-stale-multipart","Status":"Enabled","Filter":{"Prefix":"media/"},"AbortIncompleteMultipartUpload":{"DaysAfterInitiation":1}}]}' \
    --region garage
  echo "Garage setup complete."
"""
