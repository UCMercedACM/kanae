name: Test

on:
  push:
    branches:
      - main
      
  pull_request:
    branches:
      - main

jobs:
  Test:
    name: Test (${{ matrix.version }})
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        version: ['3.12', '3.13', '3.14']

    env:
      TESTCONTAINER_DOCKER_NETWORK: kanae-testcontainers
      UV_NO_DEV: true
      UV_NO_DEFAULT_GROUPS: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python ${{ matrix.version }}
        id: setup-python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.version }}

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "latest"
          enable-cache: true

      - name: Install dependencies
        run: |
          uv sync --frozen --group test

      - name: Set up server configuration
        run: |
          cp config.dist.yml src/config.yml

      - name: Create Docker network for running Testcontainers
        run: sudo docker network create ${{ env.TESTCONTAINER_DOCKER_NETWORK }}

      - name: Run Tests
        run: |
          uv run pytest

  Integration:
    name: Integration
    runs-on: ubuntu-24.04

    env:
      HURL_VERSION: 8.0.1

    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "latest"
          enable-cache: true

      - name: Install Hurl
        run: |
          sudo apt-add-repository -y ppa:lepapareil/hurl
          sudo apt install hurl="${HURL_VERSION}"*

      - name: Prepare integration stack
        run: |
          bash ./tests/integration/init.sh

      - name: Run integration tests
        run: |
          hurl --test --variables-file tests/integration/vars.env --secrets-file tests/integration/secrets.env tests/integration/scenarios/*.hurl

      - name: Clean up integration stack
        run: |
          docker compose -f docker/docker-compose.test.yml --env-file docker/.env down -v=True --remove-orphans

